<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        #box1{
            position: relative;
            width: 150px;
            height: 150px;
            background-color: deeppink;
            top: 30px;
            left: 30px;
            z-index: 10px;
        }

        #box2{
            position: relative;
            width: 150px;
            height: 150px;
            background-color: deepskyblue;
            top: -30px;
        }
    </style>
</head>

<body>
    <!-- 
        position
        - HTML 요소를 문서의 기본 흐름에서 어떻게 배치할지 결정하는 CSS 속성으로, 요소의 위치 기준과 이동 방식을 제어
        
        position: static
        모든 HTML 요소의 기본 위치 지정 방식으로, 요소가 문서의 일반적인 흐름에 따라 위에서 아래, 왼쪾에서 오른쪽 순서대로 배치됨

        postion: relative
        요소를 문서의 일반적인 흐름에 두면서, top/left/right/botttom 속성을 이용해 자기 자신의 원래 위치를 기준으로 이동시키는 위치 지정 방식임

        z-index
        CSS 에서 요소들이 화면에서 겹칠 때 어떤 요소를 위에 표시할지 결정하는 속성으로, 값이 클수록 더 위에 배치됨
    -->

    <div id="box1">박스 1</div>
    <div id="box2">박스 2</div>
</body>

</html>
