<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        body {
            background-color: deepskyblue;
        }

        h1 {
            color: white;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="./css/test.css">
</head>

<body>
    <!-- 
        CSS(Cascading Style Sheets)는 HTML과 함께 사용되며 웹 페이지의 스타일과 레이아웃을 정의하는 스타일시트 언어

        선택자 { 속성: 값; }

        선택자 : 어떤 HTML 요소에 스타일을 적용할지 지정
            h1 { color: red; }

        <head> > <style> 태그 안에 적어야한다.

        스타일 적용 방법
        1. 인라인 스타일: HTML 태그 안에 직접 style 속석으로 CSS를 작성하는 방식
        2. 내부 스타일 : <style> 태그를 사용하여 CSS를 작성하는 방식
        3. 외부 스타일 : CSS 코드를 별도의 .css 파일에 작성하고, HTML 문서에서 link 태그로 연결하는 방식
    -->

    <h1>CSS란?</h1>
    <p style="color: gold">안녕하세요. CSS입니다.</p> <!-- 인라인 적용 방법 -->
</body>

</html>
